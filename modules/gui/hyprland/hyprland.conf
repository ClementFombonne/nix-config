# --------------------------------------------
# Monitor
# --------------------------------------------
source = ~/.config/hypr/conf/monitor.conf

# --------------------------------------------
# Keybinds
# --------------------------------------------
source = ~/.config/hypr/conf/keybinds.conf

$terminal = ghostty
$browser = zen-twilight

exec-once=[workspace 1 silent] $terminal 
exec-once=[workspace 2 silent] $browser
exec-once=hyprpaper
exec-once=hypridle
exec-once=waybar
exec-once=noctalia-shell
exec-once=dunst

input {
    follow_mouse=1
    kb_layout=fr
    kb_variant=azerty
    touchpad {
        natural_scroll = true
    }
}

general {
    gaps_in=6
    gaps_out=12
    border_size=0
    col.active_border=rgb(198,160,246)
    col.inactive_border=rgb(183,189,248)
}

decoration {
    rounding=16
}

animations {
    enabled=1
    animation=windows,1,2,default,slide
}

misc {
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
    vrr = false
}

dwindle {
    pseudotile=0 # enable pseudotiling on dwindle
}

windowrule = match:class ^(zen)$, opacity 0.95 0.90
