[bar.default]
center = [ "workspaces" ]
end = [ "tray", "clipboard", "network", "bluetooth", "volume", "brightness", "battery", "clock", "session" ]
font_weight = 400
margin_ends = 10
padding = 10
position = "right"
radius = 25
scale = 1.1000000089406967
start = [ "control-center", "launcher", "notifications", "media" ]
widget_spacing = 10

[desktop_widgets]
schema_version = 1
widget_order = [
    "desktop-widget-0000000000000001",
    "desktop-widget-0000000000000002",
    "desktop-widget-0000000000000003",
    "desktop-widget-0000000000000004",
    "desktop-widget-0000000000000005"
]

    [desktop_widgets.grid]
    cell_size = 8
    major_interval = 4
    visible = true

    [desktop_widgets.widget.desktop-widget-0000000000000001]
    box_height = 128.0
    box_width = 320.0
    cx = 192.0
    cy = 96.0
    output = "eDP-1"
    rotation = 0.0
    type = "media_player"

    [desktop_widgets.widget.desktop-widget-0000000000000002]
    box_height = 96.0
    box_width = 192.0
    cx = 128.0
    cy = 240.0
    output = "eDP-1"
    rotation = 0.0
    type = "clock"

        [desktop_widgets.widget.desktop-widget-0000000000000002.settings]
        clock_style = "digital"
        font_family = ""

    [desktop_widgets.widget.desktop-widget-0000000000000003]
    box_height = 96.0
    box_width = 96.0
    cx = 304.0
    cy = 240.0
    output = "eDP-1"
    rotation = 0.0
    type = "fancy_audio_visualizer"

        [desktop_widgets.widget.desktop-widget-0000000000000003.settings]
        background = true
        sensitivity = 1.8
        visualization_mode = "wave"

    [desktop_widgets.widget.desktop-widget-0000000000000004]
    box_height = 128.0
    box_width = 224.0
    cx = 144.0
    cy = 864.0
    output = "eDP-1"
    rotation = 0.0
    type = "sysmon"

        [desktop_widgets.widget.desktop-widget-0000000000000004.settings]
        display = "graph"
        gauge_layout = "horizontal"
        stat = "cpu_usage"
        stat2 = "cpu_temp"

    [desktop_widgets.widget.desktop-widget-0000000000000005]
    box_height = 128.0
    box_width = 224.0
    cx = 400.0
    cy = 864.0
    output = "eDP-1"
    rotation = 0.0
    type = "sysmon"

        [desktop_widgets.widget.desktop-widget-0000000000000005.settings]
        display = "graph"
        gauge_layout = "horizontal"
        stat = "ram_pct"
        stat2 = "swap_pct"

[dock]
auto_hide = true
icon_size = 32
reserve_space = false

[idle]
behavior_order = [ "lock", "screen-off", "lock-and-suspend" ]

    [idle.behavior.lock]
    action = "lock"
    enabled = true
    timeout = 600.0

    [idle.behavior.lock-and-suspend]
    action = "lock_and_suspend"
    enabled = false
    timeout = 900.0

    [idle.behavior.screen-off]
    action = "screen_off"
    enabled = false
    timeout = 660.0

[location]
address = "Paris, France"

[lockscreen_widgets]
enabled = true
schema_version = 2
widget_order = [
    "lockscreen-login-box@DP-4",
    "lockscreen-login-box@DP-1",
    "lockscreen-login-box@eDP-1",
    "lockscreen-widget-0000000000000001"
]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@DP-1"]
    box_height = 70.0
    box_width = 400.0
    cx = 1024.0
    cy = 1029.0
    output = "DP-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@DP-1".settings]
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

    [lockscreen_widgets.widget."lockscreen-login-box@DP-4"]
    box_height = 70.0
    box_width = 400.0
    cx = 540.0
    cy = 1797.0
    output = "DP-4"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@DP-4".settings]
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

    [lockscreen_widgets.widget."lockscreen-login-box@eDP-1"]
    box_height = 70.0
    box_width = 400.0
    cx = 768.0
    cy = 837.0
    output = "eDP-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@eDP-1".settings]
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

    [lockscreen_widgets.widget.lockscreen-widget-0000000000000001]
    box_height = 144.0
    box_width = 400.0
    cx = 768.0
    cy = 232.0
    output = "eDP-1"
    rotation = 0.0
    type = "clock"

        [lockscreen_widgets.widget.lockscreen-widget-0000000000000001.settings]
        background = false
        background_radius = 32

[shell]
avatar_path = "~/.face"
corner_radius_scale = 2.0
font_family = "DejaVu Sans"
polkit_agent = true
telemetry_enabled = false

    [shell.greeter_sync]
    auto_sync = true

    [shell.panel]
    transparency_mode = "glass"

    [shell.screen_corners]
    enabled = true

[theme]
source = "wallpaper"

    [theme.templates]
    builtin_ids = [ "gtk3", "gtk4", "ghostty", "qt" ]

[wallpaper]
directory = "/home/clement/media/pictures/premium-fractal"

    [wallpaper.default]
    path = "/home/clement/media/pictures/premium-fractal/007.jpg"

    [wallpaper.last]
    path = "/home/clement/media/pictures/premium-fractal/007.jpg"

    [wallpaper.monitors.eDP-1]
    path = "/home/clement/media/pictures/premium-fractal/007.jpg"

[widget.battery]
show_label = false

[widget.brightness]
show_label = false

[widget.clock]
capsule = true

[widget.control-center]
capsule = true
custom_image = "/nix/store/pq5f09jy11h2i2rmr4jqqw4hjcmgfvh5-noctalia-5.0.0/share/noctalia/assets/images/distros/nixos.svg"
glyph = "topology-star-2"

[widget.session]
capsule = true

[widget.volume]
show_label = false
